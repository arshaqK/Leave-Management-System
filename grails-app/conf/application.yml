grails:
    profile: web
    codegen:
        defaultPackage: com.leavemanagement
    gorm:
        reactor:
            events: false

info:
    app:
        name: '@info.app.name@'
        version: '@info.app.version@'
        grailsVersion: '@info.app.grailsVersion@'

spring:
    main:
        banner-mode: "off"
    groovy:
        template:
            check-template-location: false
    mail:
        host: smtp.gmail.com
        port: 587
        username: your-email@gmail.com
        password: your-app-password
        properties:
            mail:
                smtp:
                    auth: true
                    starttls:
                        enable: true

management:
    endpoints:
        enabled-by-default: false

---
grails:
    mime:
        disable:
            accept:
                header:
                    userAgents:
                        - Gecko
                        - WebKit
                        - Presto
                        - Trident
        types:
            all: '*/*'
            atom: application/atom+xml
            css: text/css
            csv: text/csv
            form: application/x-www-form-urlencoded
            html:
                - text/html
                - application/xhtml+xml
            js: text/javascript
            json:
                - application/json
                - text/json
            multipartForm: multipart/form-data
            pdf: application/pdf
            rss: application/rss+xml
            text: text/plain
            hal:
                - application/hal+json
                - application/hal+xml
            xml:
                - text/xml
                - application/xml
    urlmapping:
        cache:
            maxsize: 1000
    controllers:
        defaultScope: singleton
    converters:
        encoding: UTF-8
    views:
        default:
            codec: html
        gsp:
            encoding: UTF-8
            htmlcodec: xml
            codecs:
                expression: html
                scriptlets: html
                taglib: none
                staticparts: none

environments:
    development:
        dataSource:
            dbCreate: update
            url: jdbc:mysql://localhost:3306/leave_management?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
            driverClassName: com.mysql.cj.jdbc.Driver
            dialect: org.hibernate.dialect.MySQL8Dialect
            username: leave_user
            password: leave123
    test:
        dataSource:
            dbCreate: update
            url: jdbc:mysql://localhost:3306/leave_management_test?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
            driverClassName: com.mysql.cj.jdbc.Driver
            dialect: org.hibernate.dialect.MySQL8Dialect
            username: leave_user
            password: leave123
    production:
        dataSource:
            dbCreate: none
            url: jdbc:mysql://localhost:3306/leave_management?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
            driverClassName: com.mysql.cj.jdbc.Driver
            dialect: org.hibernate.dialect.MySQL8Dialect
            username: leave_user
            password: leave123
            properties:
                jmxEnabled: true
                initialSize: 5
                maxActive: 50
                minIdle: 5
                maxIdle: 25
---
# Added by the Spring Security Core plugin:
grails:
    plugin:
        springsecurity:
            userLookup:
                userDomainClassName: 'com.leavemanagement.User'
                authorityJoinClassName: 'com.leavemanagement.UserRole'
        authority:
            className: 'com.leavemanagement.Role'
            controllerAnnotations:
                staticRules:
                    - pattern: /
                      access: ['permitAll']
                    - pattern: /error
                      access: ['permitAll']
                    - pattern: /index
                      access: ['permitAll']
                    - pattern: /index.gsp
                      access: ['permitAll']
                    - pattern: /shutdown
                      access: ['permitAll']
                    - pattern: /assets/**
                      access: ['permitAll']
                    - pattern: /**/js/**
                      access: ['permitAll']
                    - pattern: /**/css/**
                      access: ['permitAll']
                    - pattern: /**/images/**
                      access: ['permitAll']
                    - pattern: /**/favicon.ico
                      access: ['permitAll']

            filterChain:
                chainMap:
                    - pattern: /assets/**
                      filters: none
                    - pattern: /**/js/**
                      filters: none
                    - pattern: /**/css/**
                      filters: none
                    - pattern: /**/images/**
                      filters: none
                    - pattern: /**/favicon.ico
                      filters: none
                    - pattern: /**
                      filters: JOINED_FILTERS

